<head>

    <meta charset="UTF-8">
    <title>Forms</title>

</head>

<body>
    <form name="form1" action="" method="get">
        <b >Login</b>
        <br>
        <br>
        <b>Username</b>
        <input type="text" name="username" size="24"><br>
        <b>Password</b>
        <input type="password" name="password" size="24"><br>
        <input type="submit" name="send" value="Logon">

    </form><br><br>

    <table>
        <form name="form2" action="" method="get">
            <tr>
                <td><b>Username</b></td>
                <td><input type="text" name="username" size="24"></td>
            </tr>
            <tr>
                <td><b>Password</b></td>
                <td><input type="password" name="password" size="24"></td>
            </tr>
            <tr>
                <td><b>based status</b></td>
                <td><input type="radio" name="option">i use arch</td>
                <td><input type="radio" name="option">i like living a normal life</td>
            </tr>
            <tr>
                <td><b>redpilled status</b></td>
                <td><input type="checkbox" name="option1">i &lt3 ege</td>
                <td><input type="checkbox" name="option2">i &lt3 kerem</td>
            </tr>
            <tr>
                <td><b>Computer Brand:</b></td>
                <td><select name="pcbrand">
                    <option name="lenovo">lenovo</option>
                    <option name="asus">asus</option>
                    <option name="hp">hp</option>
                    <option name="monster">monster</option>
                    <option name="irrelevant">irrelevant</option>
                </select>
                </td>
            </tr>
            <tr>
                <td><b>Enter Your Comment:</b></td>
                <td><textarea cols="32" rows="4"></textarea></td>

            </tr>
        </form>   
    </table>
    <input type="submit" name="send" value="Logon">

</body>

</html>
